<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GDlist - Ruleta de Demons</title>
    <link rel="stylesheet" href="css/ruleta-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="assets/icon_login.png" type="image/x-icon">
</head>
<body>
    <div class="page">
        <header class="rl-header">
            <a href="index.html" class="rl-back">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
                Volver
            </a>
            <h1 class="rl-title">Ruleta de Demons</h1>
            <div></div>
        </header>

        <section class="config-panel" id="configPanel">
            <p class="config-sub">Selecciona un rango de niveles para la ruleta</p>
            <div class="config-group">
                <label>Rango rápido</label>
                <div class="quick-range" id="quickRange">
                    <button class="range-btn active" data-min="1" data-max="10">Top 1–10</button>
                    <button class="range-btn" data-min="10" data-max="20">10–20</button>
                    <button class="range-btn" data-min="20" data-max="30">20–30</button>
                    <button class="range-btn" data-min="30" data-max="40">30–40</button>
                    <button class="range-btn" data-min="40" data-max="50">40–50</button>
                </div>
            </div>
            <div class="config-group">
                <label>Personalizado</label>
                <div class="custom-range" id="customRangeWrap">
                    <input type="number" id="customMin" min="1" max="150" value="1">
                    <span>a</span>
                    <input type="number" id="customMax" min="1" max="150" value="10">
                </div>
            </div>
            <button class="btn-spin" id="btnSpin">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/><path d="M21 3v5h-5"/></svg>
                Girar Ruleta
            </button>
        </section>

        <section class="slot-section" id="slotSection" style="display:none">
            <div class="slot-viewport" id="slotViewport">
                <div class="slot-indicator">
                    <div class="slot-indicator-arrow"></div>
                    <div class="slot-indicator-bar"></div>
                </div>
                <div class="slot-track" id="slotTrack"></div>
            </div>
            <div class="slot-info" id="slotInfo">
                <span id="rangeLabel">Top 1–10</span>
            </div>
        </section>

        <div class="result-overlay" id="resultOverlay" style="display:none">
            <div class="result-card" id="resultCard">
                <div class="result-glow"></div>
                <div class="result-badge" id="resultBadge">
                    <span class="result-position" id="resultPosition">#1</span>
                </div>
                <div class="result-thumb" id="resultThumb">
                    <img src="" alt="">
                </div>
                <h2 id="resultName">—</h2>
                <p class="result-creator" id="resultCreator">by —</p>
                <div class="result-actions">
                    <a class="btn-spin btn-info" id="btnViewInfo" href="#" target="_blank">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
                        Ver Info
                    </a>
                    <button class="btn-spin" id="btnSpinAgain">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/><path d="M21 3v5h-5"/></svg>
                        Girar de nuevo
                    </button>
                    <button class="btn-spin btn-secondary" id="btnChangeRange">
                        Cambiar rango
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>
    <div id="bgIcons"></div>
    <script src="js/DBLEVEL.js"></script>
    <script src="js/ruleta.js"></script>
</body>
</html>

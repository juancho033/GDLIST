<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso Staff | GDlist</title>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="assets/icon_login.png" type="image/x-icon">
    <style>
        :root { --accent: #00d4ff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a1628 0%, #0d1f1f 50%, #091520 100%);
            background-attachment: fixed;
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        #bgIcons {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }
        .bg-icon {
            position: absolute;
            opacity: 0.025;
            color: #fff;
            user-select: none;
            pointer-events: none;
            font-size: 2rem;
        }

        .login-side {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
            position: relative;
            z-index: 2;
        }

        .login-box {
            position: relative;
            background: rgba(10, 18, 28, 0.7);
            backdrop-filter: blur(24px) saturate(160%);
            -webkit-backdrop-filter: blur(24px) saturate(160%);
            padding: 45px 40px;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.06);
            box-shadow: 0 25px 60px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.04);
            width: 380px;
            text-align: center;
            animation: fadeIn 0.8s ease;
            overflow: hidden;
        }

        .login-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0,212,255,0.15), transparent);
            pointer-events: none;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-5px); }
            80% { transform: translateX(5px); }
        }
        @keyframes glowPulse {
            0%, 100% { text-shadow: 0 0 15px var(--accent); }
            50% { text-shadow: 0 0 30px var(--accent), 0 0 60px rgba(0, 212, 255, 0.3); }
        }

        h1 { font-weight: 400; font-size: 1.5rem; letter-spacing: 2px; margin-bottom: 30px; font-family: 'Russo One', sans-serif; }
        h1 span { color: var(--accent); text-shadow: 0 0 15px var(--accent); animation: glowPulse 3s ease-in-out infinite; }

        .input-group {
            position: relative;
            margin-bottom: 20px;
            opacity: 0;
            animation: fadeIn 0.5s ease forwards;
        }
        .input-group:nth-child(2) { animation-delay: 0.2s; }
        .input-group:nth-child(3) { animation-delay: 0.3s; }

        .input-group svg {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            color: rgba(255,255,255,0.12);
            pointer-events: none;
            transition: color 0.3s;
            z-index: 1;
        }
        .input-group:focus-within svg { color: var(--accent); }

        input {
            width: 100%;
            padding: 14px 16px 14px 46px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            color: #e0e0e0;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s, transform 0.3s;
            position: relative;
        }
        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 24px rgba(0, 212, 255, 0.18), inset 0 0 20px rgba(0, 212, 255, 0.02);
            transform: scale(1.02);
        }
        input::placeholder { color: rgba(255,255,255,0.12); }

        .login-box.shake { animation: shake 0.4s ease !important; }

        button {
            position: relative;
            width: 100%; padding: 14px;
            background: rgba(0, 212, 255, 0.04);
            border: 1px solid rgba(0,212,255,0.12);
            border-radius: 12px;
            color: var(--accent);
            font-weight: 400;
            cursor: pointer;
            letter-spacing: 1px;
            font-size: 0.9rem;
            font-family: 'Russo One', sans-serif;
            opacity: 0;
            animation: fadeIn 0.5s ease 0.4s forwards;
            overflow: hidden;
            transition: background 0.3s, color 0.3s, transform 0.3s, box-shadow 0.3s;
        }
        button::before {
            content: "";
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0,212,255,0.1), transparent);
            transition: left 0.5s;
        }
        button:hover {
            background: rgba(0, 212, 255, 0.1);
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 8px 35px rgba(0, 212, 255, 0.3);
        }
        button:hover::before { left: 100%; }
        button:active { transform: translateY(-1px); }

        .back-link { display: block; margin-top: 22px; color: #666; text-decoration: none; font-size: 0.8rem; transition: 0.3s; opacity: 0; animation: fadeIn 0.5s ease 0.5s forwards; }
        .back-link:hover { color: var(--accent); transform: translateX(4px); }

        .cube-side {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #threeCanvas {
            display: block;
            width: 100% !important;
            height: 100% !important;
        }

        .login-popup {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.2s ease;
        }
        .login-popup.show { display: flex; }
        .popup-box {
            background: rgba(10, 18, 28, 0.9);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 16px;
            padding: 35px 40px;
            max-width: 360px;
            width: 90%;
            text-align: center;
            animation: fadeIn 0.3s ease;
        }
        .popup-box p {
            font-size: 1.05rem;
            margin: 0 0 25px;
            color: var(--text);
            line-height: 1.5;
        }
        .popup-btn {
            padding: 10px 40px;
            border-radius: 10px;
            border: 1px solid rgba(0,212,255,0.2);
            background: rgba(0, 212, 255, 0.1);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            color: var(--accent);
            font-weight: 400;
            cursor: pointer;
            font-size: 0.9rem;
            font-family: 'Russo One', sans-serif;
            transition: all 0.25s;
        }
        .popup-btn:hover {
            background: rgba(0, 212, 255, 0.2);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.4);
        }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .cube-side { display: none; }
            .login-side { padding: 20px; }
            .login-box { width: 100%; max-width: 380px; padding: 30px 25px; border-radius: 20px; }
            h1 { font-size: 1.2rem; margin-bottom: 20px; }
            .input-group svg { left: 14px; width: 16px; height: 16px; }
            input { padding: 12px 14px 12px 42px; font-size: 0.9rem; }
            button { padding: 12px; font-size: 0.85rem; }
        }

        @media (max-width: 480px) {
            .login-side { padding: 14px; }
            .login-box { padding: 22px 18px; border-radius: 16px; }
            h1 { font-size: 1rem; letter-spacing: 1px; margin-bottom: 16px; }
            .input-group svg { left: 12px; width: 14px; height: 14px; }
            .input-group { margin-bottom: 14px; }
            input { padding: 10px 12px 10px 36px; font-size: 0.85rem; }
            button { padding: 10px; font-size: 0.8rem; }
            .popup-box { padding: 24px 20px; }
            .popup-box p { font-size: 0.9rem; }
            .popup-btn { padding: 8px 30px; font-size: 0.82rem; }
        }
    </style>
</head>
<body>
    <div id="bgIcons"></div>
    <div class="login-side">
        <div class="login-box">
            <h1>LO<span>GIN</span></h1>
            <div class="input-group">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <input type="text" id="user" placeholder="Usuario">
            </div>
            <div class="input-group">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                <input type="password" id="pass" placeholder="Contraseña">
            </div>
            <button onclick="login()">AUTORIZAR ACCESO</button>
            <a href="index.html" class="back-link">&larr; Volver al Inicio</a>
        </div>
    </div>

    <div class="cube-side" id="cubeContainer">
        <canvas id="threeCanvas"></canvas>
    </div>

    <div id="loginPopup" class="login-popup">
        <div class="popup-box">
            <p id="popupMsg">Error</p>
            <button id="popupBtn" class="popup-btn">OK</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        function showPopup(msg) {
            document.getElementById('popupMsg').textContent = msg;
            document.getElementById('loginPopup').classList.add('show');
        }
        function closePopup() {
            document.getElementById('loginPopup').classList.remove('show');
        }

        function login() {
            const u = document.getElementById('user').value.trim();
            const p = document.getElementById('pass').value.trim();
            if (!u || !p) {
                showPopup('Por favor completa todos los campos');
                return;
            }
            if(u === "admin" && p === "Juancho2026") {
                sessionStorage.setItem("logged", "true");
                window.location.href = "dashboard.html";
            } else {
                const box = document.querySelector('.login-box');
                box.classList.remove('shake');
                void box.offsetWidth;
                box.classList.add('shake');
                setTimeout(() => box.classList.remove('shake'), 500);
                showPopup('Credenciales incorrectas');
            }
        }

        const container = document.getElementById('cubeContainer');
        const canvas = document.getElementById('threeCanvas');

        const scene = new THREE.Scene();

        const camera = new THREE.PerspectiveCamera(35, container.clientWidth / container.clientHeight, 0.1, 20);
        camera.position.set(0, 0.2, 6);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.shadowMap.bias = 0.0005;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        renderer.outputEncoding = THREE.sRGBEncoding;

        const ambientLight = new THREE.AmbientLight(0x223355, 0.5);
        scene.add(ambientLight);

        const hemiLight = new THREE.HemisphereLight(0x4488ff, 0x002244, 0.4);
        scene.add(hemiLight);

        const keyLight = new THREE.DirectionalLight(0xffeedd, 1.4);
        keyLight.position.set(5, 8, 6);
        keyLight.castShadow = true;
        keyLight.shadow.mapSize.width = 1024;
        keyLight.shadow.mapSize.height = 1024;
        scene.add(keyLight);

        const fillLight = new THREE.DirectionalLight(0x00ddff, 0.6);
        fillLight.position.set(-4, 2, -3);
        scene.add(fillLight);

        const rimLight = new THREE.DirectionalLight(0x6688ff, 0.4);
        rimLight.position.set(0, -4, -5);
        scene.add(rimLight);

        const backLight = new THREE.DirectionalLight(0x00aaff, 0.3);
        backLight.position.set(0, 3, -6);
        scene.add(backLight);

        const loader = new THREE.TextureLoader();
        const faceTex = loader.load('assets/icon_login.png');
        faceTex.anisotropy = renderer.capabilities.getMaxAnisotropy();
        faceTex.encoding = THREE.sRGBEncoding;

        const geo = new THREE.BoxGeometry(2.2, 2.2, 2.2);

        const sideMat = new THREE.MeshPhysicalMaterial({
            color: 0x0088aa,
            roughness: 0.25,
            metalness: 0.5,
            clearcoat: 0.4,
            clearcoatRoughness: 0.3,
            envMapIntensity: 0.6,
        });
        const sideMatDark = new THREE.MeshPhysicalMaterial({
            color: 0x006688,
            roughness: 0.35,
            metalness: 0.6,
            clearcoat: 0.3,
            clearcoatRoughness: 0.4,
            envMapIntensity: 0.5,
        });
        const topMat = new THREE.MeshPhysicalMaterial({
            color: 0x00bbdd,
            roughness: 0.15,
            metalness: 0.3,
            clearcoat: 0.6,
            clearcoatRoughness: 0.2,
            envMapIntensity: 0.8,
        });
        const faceMat = new THREE.MeshPhysicalMaterial({
            map: faceTex,
            roughness: 0.3,
            metalness: 0.1,
            clearcoat: 0.2,
            clearcoatRoughness: 0.4,
        });

        const materials = [
            sideMatDark, sideMatDark,
            topMat,
            sideMat,
            faceMat,
            sideMat,
        ];
        const cube = new THREE.Mesh(geo, materials);
        cube.castShadow = true;
        cube.receiveShadow = true;
        cube.position.y = 0;
        scene.add(cube);

        const edges = new THREE.EdgesGeometry(geo);
        const edgeMat = new THREE.LineBasicMaterial({
            color: 0x55eeff,
            transparent: true,
            opacity: 0.12,
        });
        const edgeLines = new THREE.LineSegments(edges, edgeMat);
        cube.add(edgeLines);

        const edgeMatBright = new THREE.LineBasicMaterial({
            color: 0x00ddff,
            transparent: true,
            opacity: 0.06,
        });
        const edgeLines2 = new THREE.LineSegments(
            new THREE.EdgesGeometry(new THREE.BoxGeometry(2.28, 2.28, 2.28)),
            edgeMatBright
        );
        cube.add(edgeLines2);

        const glowGroup = new THREE.Group();
        const glowMat = new THREE.MeshBasicMaterial({
            color: 0x00ddff,
            transparent: true,
            opacity: 0.05,
            wireframe: true,
            depthWrite: false,
        });
        const glowWire = new THREE.Mesh(new THREE.BoxGeometry(2.5, 2.5, 2.5), glowMat);
        glowGroup.add(glowWire);

        const glowMat2 = new THREE.MeshBasicMaterial({
            color: 0x0088ff,
            transparent: true,
            opacity: 0.025,
            wireframe: true,
            depthWrite: false,
        });
        const glowWire2 = new THREE.Mesh(new THREE.BoxGeometry(2.8, 2.8, 2.8), glowMat2);
        glowGroup.add(glowWire2);

        scene.add(glowGroup);

        const floorMat = new THREE.MeshPhysicalMaterial({
            color: 0x00bbff,
            transparent: true,
            opacity: 0.06,
            roughness: 0.9,
            metalness: 0,
            clearcoat: 0.1,
        });
        const floor = new THREE.Mesh(new THREE.CircleGeometry(3.8, 48), floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -1.35;
        floor.receiveShadow = true;
        scene.add(floor);

        const ringMat = new THREE.MeshBasicMaterial({
            color: 0x00ddff,
            transparent: true,
            opacity: 0.04,
            wireframe: true,
            depthWrite: false,
        });
        const ring = new THREE.Mesh(new THREE.RingGeometry(1.5, 3.8, 48), ringMat);
        ring.rotation.x = -Math.PI / 2;
        ring.position.y = -1.34;
        scene.add(ring);

        function resize() {
            const w = container.clientWidth;
            const h = container.clientHeight;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
        }

        window.addEventListener('resize', resize);

        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.01;

            const bob = Math.sin(time * 0.7) * 0.12;
            cube.position.y = bob;

            const breathe = 1 + Math.sin(time * 0.4) * 0.002;
            cube.scale.set(breathe, breathe, breathe);

            glowGroup.position.y = bob;
            glowWire.rotation.x = time * 0.04;
            glowWire.rotation.y = time * 0.07;
            glowWire2.rotation.x = -time * 0.03;
            glowWire2.rotation.y = -time * 0.05;

            ring.scale.x = 1 + Math.sin(time * 0.5) * 0.02;
            ring.scale.y = 1 + Math.sin(time * 0.5) * 0.02;

            renderer.render(scene, camera);
        }

        animate();
        resize();

        document.getElementById('popupBtn').addEventListener('click', closePopup);
        document.getElementById('loginPopup').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) closePopup();
        });

        const ICON_SYMBOLS = ['✦','◆','◈','◇','▣','■','▦','▩','⧈','⬡'];
        (function initBgIcons() {
            const container = document.getElementById('bgIcons');
            if (!container) return;
            for (let i = 0; i < 20; i++) {
                const el = document.createElement('div');
                el.className = 'bg-icon';
                el.textContent = ICON_SYMBOLS[i % ICON_SYMBOLS.length];
                el.style.left = Math.random() * 100 + '%';
                el.style.top = Math.random() * 100 + '%';
                el.style.fontSize = (14 + Math.random() * 24) + 'px';
                el.style.opacity = 0.015 + Math.random() * 0.025;
                el.style.transform = `rotate(${Math.random() * 360}deg)`;
                container.appendChild(el);
            }
        })();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso Staff | Demonlist</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00d4ff; }
        body {
            margin: 0; padding: 0;
            background: #050505;
            color: white;
            font-family: 'Lexend', sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh;
            background: radial-gradient(circle at center, #0a1a1f 0%, #050505 100%);
        }
        .login-box {
            background: rgba(15, 15, 15, 0.8);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(0, 212, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            width: 350px;
            text-align: center;
            animation: fadeIn 0.8s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        h1 { font-weight: 900; font-size: 1.5rem; letter-spacing: 2px; margin-bottom: 30px; }
        h1 span { color: var(--accent); text-shadow: 0 0 15px var(--accent); }

        .input-group { position: relative; margin-bottom: 20px; }
        input {
            width: 100%; padding: 12px;
            background: rgba(0,0,0,0.5);
            border: 1px solid #222;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(0, 212, 255, 0.2); }

        button {
            width: 100%; padding: 12px;
            background: var(--accent);
            border: none; border-radius: 8px;
            color: black; font-weight: 900;
            cursor: pointer; transition: 0.3s;
            letter-spacing: 1px;
        }
        button:hover { background: white; transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0, 212, 255, 0.4); }
        
        .back-link { display: block; margin-top: 20px; color: #555; text-decoration: none; font-size: 0.8rem; transition: 0.3s; }
        .back-link:hover { color: var(--accent); }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>STAFF<span>PANEL</span></h1>
        <div class="input-group">
            <input type="text" id="user" placeholder="Usuario">
        </div>
        <div class="input-group">
            <input type="password" id="pass" placeholder="Contraseña">
        </div>
        <button onclick="login()">AUTORIZAR ACCESO</button>
        <a href="index.html" class="back-link">← Volver a la lista</a>
    </div>

    <script>
        function login() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(u === "admin" && p === "Juancho2026") {
                sessionStorage.setItem("logged", "true");
                window.location.href = "dashboard.html";
            } else {
                alert("Credenciales incorrectas");
            }
        }
    </script>
</body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="front" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#0099bb"/>
    </linearGradient>
    <linearGradient id="top" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#33ddff"/>
    </linearGradient>
    <linearGradient id="right" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0099bb"/>
      <stop offset="100%" stop-color="#007799"/>
    </linearGradient>
  </defs>
  <!-- Front face -->
  <rect x="25" y="30" width="50" height="50" rx="6" fill="url(#front)" stroke="#007799" stroke-width="1.5"/>
  <!-- Top face -->
  <polygon points="25,30 50,10 75,30 50,35" fill="url(#top)" stroke="#007799" stroke-width="1.5"/>
  <!-- Right face -->
  <polygon points="75,30 75,80 50,90 50,35" fill="url(#right)" stroke="#007799" stroke-width="1.5"/>
  <!-- Eyes -->
  <circle cx="40" cy="50" r="4" fill="white"/>
  <circle cx="60" cy="50" r="4" fill="white"/>
  <circle cx="41" cy="50" r="2" fill="#111"/>
  <circle cx="61" cy="50" r="2" fill="#111"/>
  <!-- Smile -->
  <path d="M40 62 Q50 70 60 62" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>
</svg>

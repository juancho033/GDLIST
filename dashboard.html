<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>GDList - DashBoard</title>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/dashboard-style.css">
    <link rel="shortcut icon" href="assets/icon_login.png" type="image/x-icon">
</head>
<body>
    <div class="sidebar">
        <h2>MANAGER</h2>
        <button onclick="downloadDB()" class="btn-download">DESCARGAR DBLEVEL.js</button>
        <button onclick="logout()" style="background: #ff4444; margin-top: 20px;">SALIR</button>
    </div>

    <main class="content">
        <section class="form-section">
            <h3>Añadir Nuevo Nivel</h3>
            <div class="form-layout">
                <div class="grid-inputs">
                    <input type="text" id="name" placeholder="Nombre del Nivel">
                    <input type="text" id="author" placeholder="Creador">
                    <input type="text" id="verifier" placeholder="Verificador">
                    <input type="text" id="ytUrl" placeholder="URL Video (YouTube)" oninput="previewThumb()">
                    <input type="text" id="thumbUrl" placeholder="URL Miniatura (Opcional)">
                    <input type="number" id="levelID" placeholder="ID del Juego">
                    <div style="display:flex;gap:10px;grid-column:1/-1">
                        <button onclick="addLevel()" id="addBtn" style="flex:1">AÑADIR A LA LISTA</button>
                        <button onclick="cancelEdit()" id="cancelEdit" class="btn-cancel" style="display:none">Cancelar</button>
                    </div>
                </div>
                <div class="thumb-preview" id="thumbPreview">
                    <div class="thumb-placeholder">Vista previa</div>
                </div>
            </div>
        </section>

        <section class="list-section">
            <h3>Niveles Actuales <span id="levelCount"></span></h3>
            <input type="text" id="adminSearch" placeholder="Filtrar niveles..." class="admin-search">
            <div id="adminList" class="admin-grid"></div>
        </section>
    </main>

    <div id="confirmModal" class="confirm-modal">
        <div class="confirm-box">
            <p id="confirmMsg">¿Seguro que quieres borrar este nivel?</p>
            <div class="confirm-btns">
                <button id="confirmCancel" class="confirm-btn cancel">Cancelar</button>
                <button id="confirmOk" class="confirm-btn danger">Eliminar</button>
            </div>
        </div>
    </div>

    <script src="js/DBLEVEL.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
